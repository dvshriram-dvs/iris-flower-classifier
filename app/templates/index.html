<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Classifier</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🌸 Iris Flower Classifier</h1>

    <input type="number" id="sepal_length" placeholder="Sepal Length" step="any">

    <input type="number" id="sepal_width" placeholder="Sepal Width" step="any">

    <input type="number" id="petal_length" placeholder="Petal Length" step="any">

    <input type="number" id="petal_width" placeholder="Petal Width" step="any">

    <button onclick="predictFlower()">
        Predict
    </button>

    <div id="result"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
